papers:
  - layout: paper
    paper-type: inproceedings
    selected: yes
    year: 2026
    img: clarity2026nl2sql
    title: "CLARITY: A Framework and Benchmark for Conversational Language Ambiguity and Unanswerability in Interactive NL2SQL Systems"
    authors: Tabinda Sarwar, Farhad Moghimifar, Cong Duy Vu Hoang, Xiaoxiao Ma, Shawn Chang Xu, Fahimeh Saleh, Poorya Zaremoodi, Avirup Sil, Katrin Kirchhoff
    booktitle: Proceedings of the 64th Annual Meeting of the Association for Computational Linguistics (ACL 2026) (Industry Track)
    booktitle-url: https://aclanthology.org/2026.acl-industry.86/
    doc-url: https://aclanthology.org/2026.acl-industry.86/
    venue: conference
    abstract: >
      We introduce CLARITY, a framework and benchmark for evaluating conversational language ambiguity and
      unanswerability in interactive NL2SQL systems. Real-world NL2SQL deployments must handle ambiguous,
      underspecified, or unanswerable user requests in a multi-turn dialogue setting. CLARITY provides
      a systematic taxonomy of ambiguity types and unanswerability conditions, along with a benchmark
      dataset for evaluating how well NL2SQL systems identify, clarify, and resolve such inputs.

  - layout: paper
    paper-type: inproceedings
    selected: yes
    year: 2025
    img: distillc2025nl2sql
    title: "Distill-C: Enhanced NL2SQL via Distilled Customization with LLMs"
    authors: Cong Duy Vu Hoang, Gioacchino Tangari, Clemence Lanfranchi, Dalu Guo, Paul Cayet, Steve Siu, Don Dharmasiri, Yuan-Fang Li, Long Duong, Damien Hilloulin, Rhicheek Patra, Sungpack Hong, Hassan Chafi
    booktitle: Proceedings of the 2025 Conference of the Nations of the Americas Chapter of the Association for Computational Linguistics (NAACL 2025) (Industry Track)
    booktitle-url: https://aclanthology.org/2025.naacl-industry
    doc-url: https://aclanthology.org/2025.naacl-industry
    venue: conference
    abstract: >
      We present Distill-C, a framework for enhancing NL2SQL systems via distilled customization with
      large language models. By combining knowledge distillation with domain-specific customization,
      Distill-C achieves strong NL2SQL performance while remaining practical for enterprise deployment
      across Oracle SQL and PL/SQL environments.

  - layout: paper
    paper-type: inproceedings
    selected: yes
    year: 2025
    img: codellms2025synthesis
    title: "Mastering the Craft of Data Synthesis for CodeLLMs"
    authors: Meng Chen, Philip Arthur, Qianyu Feng, Cong Duy Vu Hoang, Yu-Heng Hong, Mahdi Kazemi Moghaddam, Omid Nezami, Duc Thien Nguyen, Gioacchino Tangari, Duy Vu, Thanh Vu, Mark Johnson, Krishnaram Kenthapadi, Don Dharmasiri, Long Duong, Yuan-Fang Li
    booktitle: Proceedings of the 2025 Conference of the Nations of the Americas Chapter of the Association for Computational Linguistics (NAACL 2025) (Long Paper)
    booktitle-url: https://aclanthology.org/2025.naacl-long
    doc-url: https://aclanthology.org/2025.naacl-long
    venue: conference
    abstract: >
      We present a systematic study on data synthesis for training Code LLMs.
      We identify key principles for crafting high-quality synthetic training data and demonstrate
      their effectiveness across code generation benchmarks. Our findings provide practical guidance
      for building production-grade Code LLMs with limited human-annotated data.

  - layout: paper
    paper-type: inproceedings
    selected: no
    year: 2025
    img: sqlong2025nl2sql
    title: "SQLong: Enhanced NL2SQL for Longer Contexts with LLMs"
    authors: Quoc Dai Nguyen, Cong Duy Vu Hoang, Duy Quang Vu, Gioacchino Tangari, Thanh Vu, Don Dharmasiri, Yuan-Fang Li, Long Duong
    booktitle: Proceedings of the 4th Table Representation Learning Workshop at ACL 2025
    booktitle-url: https://aclanthology.org/2025.acl-workshops
    doc-url: https://aclanthology.org/2025.acl-workshops
    venue: workshop
    abstract: >
      We present SQLong, a framework for enhancing NL2SQL performance on long-context inputs using
      large language models. As enterprise schemas grow in complexity, handling long table descriptions
      and multi-table joins becomes critical. SQLong introduces targeted techniques for long-context
      fine-tuning and retrieval to improve accuracy on complex, real-world SQL generation tasks.

  - layout: paper
    paper-type: phddissertation
    selected: yes 
    year: 2019
    img: phdthesis2019unimelbvu
    title: On the Use of Prior and External Knowledge in Neural Sequence Models
    institution: The University of Melbourne, VIC, Australia
    doc-url: http://hdl.handle.net/11343/225845
    slides: 
    latex: 
    abstract: >
      Neural sequence models have recently achieved great success across various natural language processing tasks. In practice, neural sequence models require massive amount of annotated training data to reach their desirable performance; however, there will not always be available data across languages, domains or tasks at hand. Prior and external knowledge provides additional contextual information, potentially improving the modelling performance as well as compensating the lack of large training data, particular in low-resourced situations. In this thesis, we investigate the usefulness of utilising prior and external knowledge for improving neural sequence models. We propose the use of various kinds of prior and external knowledge and present different approaches for integrating them into both training and inference phases of neural sequence models. The followings are main contributions of this thesis which are summarised in two major parts.
      We present the first part of this thesis which is on Training and Modelling for neural sequence models. In this part, we investigate different situations (particularly in low resource settings) in which prior and external knowledge, such as side information, linguistic factors, monolingual data, is shown to have great benefits for improving performance of neural sequence models. In addition, we introduce a new means for incorporating prior and external knowledge based on the moment matching framework. This framework serves its purpose for exploiting prior and external knowledge as global features of generated sequences in neural sequence models in order to improve the overall quality of the desired output sequence. 
      The second part is about Decoding of neural sequence models in which we propose a novel decoding framework with relaxed continuous optimisation in order to address one of the drawbacks of existing approximate decoding methods, namely the limited ability to incorporate global factors due to intractable search. 
      We hope that this PhD thesis, constituted by two above major parts, will shed light on the use of prior and external knowledge in neural sequence models, both in their training and decoding phases.
  - layout: paper
    paper-type: inproceedings
    selected: yes
    year: 2019
    img: acl2019demo
    title: An Adaptable Task-oriented Dialog System for Stand-alone Embedded Devices
    authors: Long Duong, Vu Cong Duy Hoang, Tuyen Quang Pham, Yu-Heng Hong, Vladislavs Dovgalecs, Guy Bashkansky, Jason Black, Andrew Bleeker, Serge Le Huitouze, Mark Johnson
    booktitle: Proceedings of Annual Meeting of the Association for Computational Linguistics (ACL-19) (System Demonstrations)
    booktitle-url: 
    doc-url:  https://www.aclweb.org/anthology/papers/P/P19/P19-3009/
    video: https://youtu.be/N3IBMGocvHU
    abstract: > 
      This paper describes a spoken-language end-to-end task-oriented dialogue system for small embedded devices such as home appliances. 
      While the current system implements a smart alarm clock with advanced calendar scheduling functionality, the system is designed to make it easy to port to other application domains (e.g., the dialogue component factors out domain-specific execution from domain-general actions such as requesting and updating slot values). 
      The system does not require internet connectivity because all components, including speech recognition, natural language understanding, dialogue management, execution and text-to-speech, run locally on the embedded device (our demo uses a Raspberry Pi). 
      This simplifies deployment, minimizes server costs and most importantly, eliminates user privacy risks. The demo video in alarm domain is here youtu.be/N3IBMGocvHU. 
  - layout: paper
    paper-type: article
    year: 2018
    selected: yes
    img: arxiv2018mm
    title: Moment Matching Training for Neural Machine Translation - A Preliminary Study
    authors: Cong Duy Vu Hoang, Ioan Calapodescu, Marc Dymetman
    journal: arXiv preprint
    journal-url: https://arxiv.org/abs/1812.09836
    doc-url: https://arxiv.org/abs/1812.09836
    abstract: > 
      In previous works, neural sequence models have been shown to improve significantly if external prior knowledge can be provided, 
      for instance by allowing the model to access the embeddings of explicit features during both training and inference. 
      In this work, we propose a different point of view on how to incorporate prior knowledge in a principled way, 
      using a moment matching framework. In this approach, the standard local cross-entropy training of the sequential model 
      is combined with a moment matching training mode that encourages the equality of the expectations of certain predefined 
      features between the model distribution and the empirical distribution. In particular, we show how to derive unbiased 
      estimates of some stochastic gradients that are central to the training, and compare our framework with 
      a formally related one: policy gradient training in reinforcement learning, pointing out some important differences 
      in terms of the kinds of prior assumptions in both approaches. Our initial results are promising, showing 
      the effectiveness of our proposed framework. 
