<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{{ page.title }}</title>

    <link href="css/bootstrap.min.css" rel="stylesheet" media="screen">
    <link href="css/bootstrap-glyphicons.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- MathJax -->
    <script type="text/javascript"
      src="https://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-AMS-MML_HTMLorMML">
    </script>

    <!--[if lt IE 9]>
    <script src="//html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <style>
      body {
        background: linear-gradient(135deg, #f0f4ff 0%, #e8eef8 50%, #f4f0ff 100%);
        min-height: 100vh;
      }
      #neural-bg {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 0;
        pointer-events: none;
      }
      .container {
        position: relative;
        z-index: 1;
        background: rgba(255,255,255,0.88);
        border-radius: 6px;
        margin-top: 16px;
        margin-bottom: 16px;
        padding: 20px 36px 8px 36px;
        box-shadow: 0 2px 28px rgba(20,52,120,0.09);
      }
    </style>
  </head>
  <body>
    <!-- JavaScript plugins (requires jQuery) -->
    <script src="https://code.jquery.com/jquery.js"></script>
    <!-- Include all compiled plugins (below), or include individual files as needed -->
    <script src="js/bootstrap.min.js"></script>

    <canvas id="neural-bg"></canvas>

    <div class="container">
      <div class="row">
        <div class="col-sm-2">
          {% include nav-bar.html %}
        </div>
        <div class="col-sm-10">
          {{ content }}
        </div>
      </div>
      <footer class="text-center text-muted">
        <hr/>
        Last updated {{ site.time | date: "%B %d, %Y" }}.<br/>
        Created with
        <a href="http://git-scm.com/">git</a>,
        <a href="http://jekyllrb.com">jekyll</a>,
        <a href="http://getbootstrap.com/">bootstrap</a>,
        and <a href="http://www.vim.org/">vim</a>.<br/>
        Adapted from
        <a href="https://github.com/alopez/alopez.github.com">Adam Lopez's code</a>.<br/>
        <br/><br/>
      </footer>
    </div>

    <script>
    (function () {
      var canvas = document.getElementById('neural-bg');
      var ctx = canvas.getContext('2d');
      var nodes = [], animId;
      var N = 60, MAX_D = 155;

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function init() {
        nodes = [];
        for (var i = 0; i < N; i++) {
          nodes.push({
            x:  Math.random() * canvas.width,
            y:  Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 0.38,
            vy: (Math.random() - 0.5) * 0.38,
            r:  Math.random() * 2.2 + 1.4,
            pulse: Math.random() * Math.PI * 2
          });
        }
      }

      function frame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        /* connections */
        for (var i = 0; i < nodes.length; i++) {
          for (var j = i + 1; j < nodes.length; j++) {
            var dx = nodes[i].x - nodes[j].x;
            var dy = nodes[i].y - nodes[j].y;
            var d  = Math.sqrt(dx*dx + dy*dy);
            if (d < MAX_D) {
              ctx.beginPath();
              ctx.strokeStyle = 'rgba(20,52,120,' + (1 - d / MAX_D) * 0.18 + ')';
              ctx.lineWidth = 0.8;
              ctx.moveTo(nodes[i].x, nodes[i].y);
              ctx.lineTo(nodes[j].x, nodes[j].y);
              ctx.stroke();
            }
          }
        }

        /* nodes */
        for (var i = 0; i < nodes.length; i++) {
          var n = nodes[i];
          n.pulse += 0.018;
          var glow = 0.32 + 0.14 * Math.sin(n.pulse);
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(20,52,120,' + glow + ')';
          ctx.fill();

          var grad = ctx.createRadialGradient(n.x, n.y, n.r, n.x, n.y, n.r * 4);
          grad.addColorStop(0, 'rgba(80,130,220,0.12)');
          grad.addColorStop(1, 'rgba(80,130,220,0)');
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r * 4, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.fill();

          n.x += n.vx;
          n.y += n.vy;
          if (n.x < 0 || n.x > canvas.width)  n.vx = -n.vx;
          if (n.y < 0 || n.y > canvas.height) n.vy = -n.vy;
        }

        animId = requestAnimationFrame(frame);
      }

      resize(); init(); frame();

      window.addEventListener('resize', function () { resize(); init(); });

      document.addEventListener('visibilitychange', function () {
        if (document.hidden) { cancelAnimationFrame(animId); }
        else { frame(); }
      });
    })();
    </script>
  </body>
</html>
